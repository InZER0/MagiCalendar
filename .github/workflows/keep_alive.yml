name: Streamlit Keep Alive
on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 (11시간은 너무 길어요)
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -sS https://magicalendar.streamlit.app/ -o /dev/null
          echo "Pinged at $(date)"
